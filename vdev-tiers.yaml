# vdev 위험도 티어 정책 (불변, 플러그인 소유)
# Risk-tiered workflow tier definitions for vway-kit plugin

tiers:
  docs:
    description: "코드 없는 변경 (문서, 주석, 설정값만)"
    superpowers: false
    gates:
      - doc-sync

  dev:
    description: "코드 포함 변경 (precommit = 변경 모듈 lint/static/import_lint/test)"
    superpowers: true
    gates:
      - precommit
      - review
      - doc-sync

  staging:
    description: "QA/RC 승격 (dev → stage) — 전체 모듈 보안 도구 사전검사"
    superpowers: true
    gates:
      - precommit
      - review
      - security-scan

  release:
    description: "프로덕션 배포 (stage → main) — 보안 도구 + 보안 리뷰"
    superpowers: true
    gates:
      - precommit
      - review
      - security-scan
      - security
