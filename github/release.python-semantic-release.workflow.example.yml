# Semantic release (Python/python-semantic-release) — rendered by /flow-init from flow-config.versioning.
# Standard semantic-release: version bump + tag + GitHub Release. The release commit is [skip ci].
# Prerequisite: repo Settings → Actions → Workflow permissions = "Read and write".
# Auth: every checkout/step references ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}.
# By default the release runs on the auto-provided GITHUB_TOKEN — RELEASE_TOKEN is OPTIONAL:
# when that repo secret is unset the expression falls back to GITHUB_TOKEN automatically
# (ensure Settings → Actions → Workflow permissions = Read and write). Add RELEASE_TOKEN (a
# fine-grained PAT, Contents+Workflows: RW) only to escalate — bypass branch protection or
# trigger downstream workflows; no YAML edit needed, the fallback picks it up.
# How to grant: see the generated docs/operations/commit-versioning-guide.md.
# The detailed semantic-release config ([tool.semantic_release]) lives in the project's pyproject (see commit-versioning-guide).
# Prerelease branch pushes force the bump level from a `Release-Level: major|minor|patch` commit trailer (fallback: auto-derive).
# Stable branch pushes rc-strip via the shipped .claude/harness-tier/scripts/finalize_prerelease.py, which targets
# pyproject.toml + plugin.json; other stacks fall back to plain compute on the stable branch.
name: release

on:
  push:
    branches: [__HARNESS_STABLE__, __HARNESS_PRERELEASE__]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    outputs:
      tag: ${{ steps.exposetag.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install python-semantic-release
        run: pip install "python-semantic-release>=10,<11"
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Semantic release — prerelease rc (forced level from trailer)
        id: sr_pre
        if: ${{ github.ref_name == '__HARNESS_PRERELEASE__' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          BEFORE="$(git rev-parse HEAD)"
          LEVEL="$(git log -1 --pretty=%B | sed -nE 's/^Release-Level:[[:space:]]*(major|minor|patch)[[:space:]]*$/\1/p' | head -1)"
          if [ -n "$LEVEL" ]; then
            semantic-release version --"$LEVEL" --as-prerelease --commit --tag --push --changelog
          else
            semantic-release version --commit --tag --push --changelog
          fi
          AFTER="$(git rev-parse HEAD)"
          if [ "$BEFORE" != "$AFTER" ]; then echo "released=true" >> "$GITHUB_OUTPUT"; fi

      - name: Release — stable finalize (rc-strip) or hotfix compute
        id: sr_stable
        if: ${{ github.ref_name == '__HARNESS_STABLE__' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          BEFORE="$(git rev-parse HEAD)"
          FINALIZE=".claude/harness-tier/scripts/finalize_prerelease.py"
          if [ -f "$FINALIZE" ] && STABLE="$(python "$FINALIZE")"; then
            git add pyproject.toml .claude-plugin/plugin.json 2>/dev/null || git add -A
            git commit -m "chore(release): $STABLE [skip ci]"
            git tag "v$STABLE"; git push origin HEAD:__HARNESS_STABLE__; git push origin "v$STABLE"
          else
            semantic-release version --commit --tag --push --changelog
          fi
          AFTER="$(git rev-parse HEAD)"
          if [ "$BEFORE" != "$AFTER" ]; then echo "released=true" >> "$GITHUB_OUTPUT"; fi

      - name: Aggregate release result
        id: sr
        run: |
          if [ "${{ steps.sr_pre.outputs.released }}" = "true" ] || [ "${{ steps.sr_stable.outputs.released }}" = "true" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: ${{ steps.sr.outputs.released == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG="$(git describe --tags --abbrev=0)"
          PRERELEASE=""
          [ "$REF_NAME" = "__HARNESS_PRERELEASE__" ] && PRERELEASE="--prerelease"
          # Release body = the CHANGELOG.md section(s) for the version being released
          # (semantic-release default path; grouped by type). For a clean body, exclude
          # plumbing types via [tool.semantic_release.changelog] exclude_commit_patterns
          # (chore/ci/refactor/style/test/build-non-deps/merge). awk keeps every LEADING
          # section whose "## vX.Y.Z" core equals the tag core and drops the headers (merges
          # multiple rc's into the stable body), then stops at the first older version. A
          # top-section core mismatch / stale / missing changelog → empty → auto-notes
          # fallback; `|| true` keeps errexit+pipefail from aborting the step. Custom
          # changelog_file? adjust the path.
          TCORE="$(printf '%s' "$TAG" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)"
          awk -v core="$TCORE" '/^## /{v=""; if (match($0,/[0-9]+\.[0-9]+\.[0-9]+/)) v=substr($0,RSTART,RLENGTH); if (v!=core) exit; seen=1; next} seen{print}' CHANGELOG.md > release-body.md 2>/dev/null || true
          if [ -n "$TCORE" ] && [ -s release-body.md ] && grep -q '[^[:space:]]' release-body.md; then
            gh release create "$TAG" --title "$TAG" --notes-file release-body.md $PRERELEASE
          else
            gh release create "$TAG" --title "$TAG" --generate-notes $PRERELEASE
          fi

      - name: Expose released tag
        id: exposetag
        run: |
          if [ "${{ steps.sr.outputs.released }}" = "true" ]; then
            echo "tag=$(git describe --tags --abbrev=0)" >> "$GITHUB_OUTPUT"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi

  # __HARNESS_DEPLOY_BEGIN__ (managed by /harness-deployments · /flow-init — do not edit inside)
  # __HARNESS_DEPLOY_END__
