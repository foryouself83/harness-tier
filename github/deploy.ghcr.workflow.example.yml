# Deploy (GHCR image) — reusable component (workflow_call) invoked by deploy.yml's orchestrator, or
# run manually via workflow_dispatch. Builds a container image and pushes it to GitHub Container
# Registry using the built-in GITHUB_TOKEN (no extra secret needed — just packages: write).
name: deploy-ghcr

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to deploy (e.g. v1.2.3)"
        required: true
        type: string

concurrency:
  group: deploy-ghcr-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: __HARNESS_TIMEOUT__
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: __HARNESS_CONTEXT__
          file: __HARNESS_DOCKERFILE__
          push: true
          tags: |
            __HARNESS_IMAGE__:${{ inputs.tag }}
            __HARNESS_IMAGE__:latest
