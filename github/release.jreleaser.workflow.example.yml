# Release (Java/Kotlin, JReleaser) — rendered by /flow-init from flow-config.versioning.
# JReleaser natively creates the tag + GitHub Release + changelog in one step, but — unlike
# semantic-release/python-semantic-release — it does NOT derive patch/minor/major from
# Conventional Commits (verified against jreleaser.org docs; version is always external input).
# So the bump level comes from the same `Release-Level: major|minor|patch` commit trailer the
# `/flow` staging-bump step already writes (default: patch when absent).
# Assumes a `jreleaser.yml` already exists in the repo (owner/repo, changelog, and
# `release.github.prerelease.pattern` config) — harness-init proposes one during research;
# see docs/operations/commit-versioning-guide.md.
# Version is tag-based (no version file rewrite) — same SSOT model as the Go/goreleaser template.
# Auth: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }} (falls back to GITHUB_TOKEN when unset).
name: release

on:
  push:
    branches: [__HARNESS_STABLE__, __HARNESS_PRERELEASE__]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    outputs:
      tag: ${{ steps.exposetag.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Install JReleaser CLI
        run: curl -sSfL https://jreleaser.org/setup.sh | sh
      - name: Compute next version
        id: ver
        env:
          REF_NAME: ${{ github.ref_name }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          LEVEL="$(git log -1 --pretty=%B | sed -nE 's/^Release-Level:[[:space:]]*(major|minor|patch)[[:space:]]*$/\1/p' | head -1)"
          LEVEL="${LEVEL:-patch}"
          CURRENT="$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo 0.0.0)"
          if [ "$REF_NAME" = "__HARNESS_PRERELEASE__" ]; then
            NEXT="$(python3 .claude/harness-tier/scripts/bump_version.py bump --current "$CURRENT" --level "$LEVEL" --prerelease "rc.$RUN_NUMBER")"
          else
            NEXT="$(python3 .claude/harness-tier/scripts/bump_version.py finalize --current "$CURRENT" || true)"
            if [ -z "$NEXT" ]; then
              NEXT="$(python3 .claude/harness-tier/scripts/bump_version.py bump --current "$CURRENT" --level "$LEVEL")"
            fi
          fi
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
      - name: JReleaser full-release
        env:
          JRELEASER_GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          # `--project-version` is only a `release --auto-config` flag, not `full-release` (no
          # such option there) — the env var is JReleaser's documented JRELEASER_<KEY> override
          # for `project.version` and is picked up without a CLI flag.
          JRELEASER_PROJECT_VERSION: ${{ steps.ver.outputs.version }}
        run: jreleaser full-release

      - name: Expose released tag
        id: exposetag
        run: echo "tag=$(git describe --tags --abbrev=0)" >> "$GITHUB_OUTPUT"

  # __HARNESS_DEPLOY_BEGIN__ (managed by /harness-deployments · /flow-init — do not edit inside)
  # __HARNESS_DEPLOY_END__
