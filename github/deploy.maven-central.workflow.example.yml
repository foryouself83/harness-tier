# Deploy (Maven Central) — reusable component (workflow_call) invoked by deploy.yml's orchestrator,
# or run manually via workflow_dispatch. Builds and deploys to Central. Requires
# MAVEN_CENTRAL_USERNAME / MAVEN_CENTRAL_PASSWORD (Central portal token) and, for signed artifacts,
# MAVEN_GPG_PRIVATE_KEY / MAVEN_GPG_PASSPHRASE.
name: deploy-maven-central

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to deploy (e.g. v1.2.3)"
        required: true
        type: string

concurrency:
  group: deploy-maven-central-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: __HARNESS_TIMEOUT__
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "__HARNESS_VERSION__"
      - name: Build package
        run: __HARNESS_BUILD__
      - name: Deploy to Maven Central
        run: mvn -B -DskipTests deploy
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
