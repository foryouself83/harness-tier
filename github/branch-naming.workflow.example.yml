# Branch naming validation (Git-flow). Rendered by /flow-init. push trigger (compatible with projects not using PRs).
name: branch-naming

on:
  push:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check branch name
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          echo "Checking: $BRANCH"
          PATTERNS=(
            "^__HARNESS_STABLE__$" "^__HARNESS_PRERELEASE__$" "^dev$"
            "^feature/[a-zA-Z0-9][a-zA-Z0-9._/-]*$"
            "^fix/[a-zA-Z0-9][a-zA-Z0-9._/-]*$"
            "^docs/[a-zA-Z0-9][a-zA-Z0-9._/-]*$"
            "^hotfix/[0-9]+\.[0-9]+\.[0-9]+$"
            "^release/[0-9]+\.[0-9]+\.[0-9]+$"
          )
          for p in "${PATTERNS[@]}"; do
            if [[ "$BRANCH" =~ $p ]]; then echo "matches: $p"; exit 0; fi
          done
          echo "Invalid branch name: $BRANCH"; exit 1
