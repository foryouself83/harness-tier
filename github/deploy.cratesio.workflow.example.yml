# Deploy (crates.io) — reusable component (workflow_call) invoked by deploy.yml's orchestrator, or
# run manually via workflow_dispatch. Publishes the crate. Requires a CARGO_REGISTRY_TOKEN secret.
name: deploy-cratesio

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to deploy (e.g. v1.2.3)"
        required: true
        type: string

concurrency:
  group: deploy-cratesio-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: __HARNESS_TIMEOUT__
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: __HARNESS_BUILD__
      - name: Publish to crates.io
        # cargo reads CARGO_REGISTRY_TOKEN natively, so no --token flag: passing it would put the
        # secret in argv, where the runner's process list exposes it. That variable covers the
        # default registry only — publishing to an alternate one takes CARGO_REGISTRIES_<NAME>_TOKEN.
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
