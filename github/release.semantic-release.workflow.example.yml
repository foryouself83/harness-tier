# Semantic release (Node/semantic-release) — rendered by /flow-init from flow-config.versioning.
# Standard semantic-release (@semantic-release/*). The detailed config lives in the project's .releaserc.
# Release notes: @semantic-release/github publishes the generated changelog (grouped by
# type, plumbing filtered) as the GitHub Release body — no extra step needed here.
# Prerequisite: repo Settings → Actions → Workflow permissions = "Read and write".
# Auth: references ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}. By default it runs
# on the auto-provided GITHUB_TOKEN — RELEASE_TOKEN is OPTIONAL and falls back to GITHUB_TOKEN
# when unset. Add that repo secret (a fine-grained PAT, Contents+Workflows: RW) only to
# escalate: bypass branch protection or trigger downstream workflows (no YAML edit needed).
name: release

on:
  push:
    branches: [__HARNESS_STABLE__, __HARNESS_PRERELEASE__]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    outputs:
      tag: ${{ steps.exposetag.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Semantic release
        id: sr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          out="$(npx --yes semantic-release 2>&1)"; echo "$out"
          if printf '%s\n' "$out" | grep -qiE 'Published release'; then
            echo "released=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Expose released tag
        id: exposetag
        run: |
          if [ "${{ steps.sr.outputs.released }}" = "true" ]; then
            echo "tag=$(git describe --tags --abbrev=0)" >> "$GITHUB_OUTPUT"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi

  # __HARNESS_DEPLOY_BEGIN__ (managed by /harness-deployments · /flow-init — do not edit inside)
  # __HARNESS_DEPLOY_END__
