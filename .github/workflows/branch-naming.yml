# Branch naming validation (Git-flow). harness-tier does not use PRs → push trigger.
# Only protected branches (main/stage/dev) and working-branch prefix patterns are allowed.
name: branch-naming

on:
  push:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Check branch name
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          echo "Checking: $BRANCH"
          PATTERNS=(
            "^main$" "^stage$" "^dev$"
            "^feature/[a-zA-Z0-9][a-zA-Z0-9._/-]*$"
            "^fix/[a-zA-Z0-9][a-zA-Z0-9._/-]*$"
            "^docs/[a-zA-Z0-9][a-zA-Z0-9._/-]*$"
            "^hotfix/[0-9]+\.[0-9]+\.[0-9]+$"
            "^release/[0-9]+\.[0-9]+\.[0-9]+$"
          )
          for p in "${PATTERNS[@]}"; do
            if [[ "$BRANCH" =~ $p ]]; then
              echo "✅ matches: $p"; exit 0
            fi
          done
          echo "❌ Invalid branch name: $BRANCH"
          echo "Allowed: main/stage/dev, feature/*, fix/*, docs/*, hotfix/x.y.z, release/x.y.z"
          exit 1
