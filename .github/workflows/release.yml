# Semantic version release — on main(stable)/stage(rc) push, parse feat/fix to bump the version.
# Tightly coupled: plugin.json version is the update-gating SSOT. The main release immutably pins
# the marketplace source.sha to the release commit (pin-to-parent). The release commit uses [skip ci] to
# prevent loops. The pin/Release steps run only when an actual release occurred (HEAD changed).
# Prerequisite: repo Settings → Actions → Workflow permissions = "Read and write".
name: release

on:
  push:
    branches: [main, stage]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install python-semantic-release
        run: pip install "python-semantic-release>=10,<11"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Semantic release (bump + tag + push)
        id: sr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BEFORE="$(git rev-parse HEAD)"
          semantic-release version --commit --tag --push --changelog
          AFTER="$(git rev-parse HEAD)"
          if [ "$BEFORE" != "$AFTER" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
          else
            echo "no release (no version-bumping commits since last tag)"
          fi

      - name: Pin marketplace sha to release commit (main only)
        if: ${{ github.ref_name == 'main' && steps.sr.outputs.released == 'true' }}
        run: |
          RELEASE_SHA="$(git rev-parse HEAD)"   # the release commit semantic-release made (includes the plugin.json version)
          python .github/scripts/pin-marketplace-sha.py "$RELEASE_SHA"
          git add .claude-plugin/marketplace.json
          if git diff --cached --quiet; then
            echo "marketplace sha already current"
            exit 0
          fi
          git commit -m "chore(release): pin marketplace sha [skip ci]" \
            -m "Pin source.sha to the commit just released (which carries the plugin.json version)."
          git push origin HEAD:main

      - name: Sync uv.lock to released version
        if: ${{ steps.sr.outputs.released == 'true' }}
        run: |
          pip install uv
          uv lock                               # derived artifact: regenerate from the bumped pyproject version
          git add uv.lock
          if git diff --cached --quiet; then
            echo "uv.lock already in sync"
            exit 0
          fi
          git commit -m "chore(release): sync uv.lock [skip ci]" \
            -m "Align uv.lock's project version with the released version (semantic-release only bumps pyproject/plugin.json)."
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Create GitHub Release
        if: ${{ steps.sr.outputs.released == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG="$(git describe --tags --abbrev=0)"
          if gh release view "$TAG" &>/dev/null; then
            gh release delete "$TAG" --yes
          fi
          PRERELEASE=""
          [ "$REF_NAME" = "stage" ] && PRERELEASE="--prerelease"
          gh release create "$TAG" --title "$TAG" --generate-notes $PRERELEASE
