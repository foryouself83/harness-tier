# Semantic version release — on main(stable)/stage(rc) push, parse feat/fix to bump the version.
# Tightly coupled: plugin.json version is the update-gating SSOT. The main release immutably pins
# the marketplace source.sha to the release commit (pin-to-parent). The release commit uses [skip ci] to
# prevent loops. The pin/Release steps run only when an actual release occurred (HEAD changed).
# Prerequisite: repo Settings → Actions → Workflow permissions = "Read and write".
name: release

on:
  push:
    branches: [main, stage]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install python-semantic-release
        run: pip install "python-semantic-release>=10,<11"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Preflight — token write permission
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set +e
          bash scripts/check-token-write.sh
          rc=$?
          if [ "$rc" = "10" ]; then
            {
              echo "## ❌ Release blocked — token lacks write permission"
              echo "Grant it: **Settings → Actions → General → Workflow permissions → Read and write**,"
              echo "or use a PAT secret \`RELEASE_TOKEN\` with Contents+Workflows: Read and write."
              echo "See USAGE.md → \"Release token write permission\"."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error::token lacks write permission (see job summary / USAGE.md)"
            exit 1
          fi
          echo "token write preflight: rc=$rc (0=ok; 20=undetermined → continue; a later failure step surfaces the how-to)"

      - name: Semantic release — stage rc (forced level from trailer)
        id: sr_stage
        if: ${{ github.ref_name == 'stage' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          BEFORE="$(git rev-parse HEAD)"
          LEVEL="$(git log -1 --pretty=%B | sed -nE 's/^Release-Level:[[:space:]]*(major|minor|patch)[[:space:]]*$/\1/p' | head -1)"
          if [ -n "$LEVEL" ]; then
            echo "forcing $LEVEL (from Release-Level trailer)"
            semantic-release version --"$LEVEL" --as-prerelease --commit --tag --push --changelog
          else
            echo "no Release-Level trailer — auto-deriving"
            semantic-release version --commit --tag --push --changelog
          fi
          AFTER="$(git rev-parse HEAD)"
          [ "$BEFORE" != "$AFTER" ] && echo "released=true" >> "$GITHUB_OUTPUT" || echo "no release"

      - name: Release — main finalize (rc-strip) or hotfix compute
        id: sr_main
        if: ${{ github.ref_name == 'main' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          BEFORE="$(git rev-parse HEAD)"
          if STABLE="$(python scripts/finalize_prerelease.py)"; then
            echo "finalizing prerelease -> $STABLE (deterministic rc-strip)"
            git add pyproject.toml .claude-plugin/plugin.json
            git commit -m "chore(release): $STABLE [skip ci]"
            git tag "v$STABLE"
            git push origin HEAD:main
            git push origin "v$STABLE"
          else
            echo "no prerelease to finalize (hotfix) — plain compute"
            semantic-release version --commit --tag --push --changelog
          fi
          AFTER="$(git rev-parse HEAD)"
          [ "$BEFORE" != "$AFTER" ] && echo "released=true" >> "$GITHUB_OUTPUT" || echo "no release"

      - name: Aggregate release result
        id: sr
        run: |
          if [ "${{ steps.sr_stage.outputs.released }}" = "true" ] || [ "${{ steps.sr_main.outputs.released }}" = "true" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Pin marketplace sha to release commit (main only)
        if: ${{ github.ref_name == 'main' && steps.sr.outputs.released == 'true' }}
        run: |
          RELEASE_SHA="$(git rev-parse HEAD)"   # the release commit semantic-release made (includes the plugin.json version)
          python .github/scripts/pin-marketplace-sha.py "$RELEASE_SHA"
          git add .claude-plugin/marketplace.json
          if git diff --cached --quiet; then
            echo "marketplace sha already current"
            exit 0
          fi
          git commit -m "chore(release): pin marketplace sha [skip ci]" \
            -m "Pin source.sha to the commit just released (which carries the plugin.json version)."
          git push origin HEAD:main

      - name: Sync uv.lock to released version
        if: ${{ steps.sr.outputs.released == 'true' }}
        run: |
          pip install uv
          uv lock                               # derived artifact: regenerate from the bumped pyproject version
          git add uv.lock
          if git diff --cached --quiet; then
            echo "uv.lock already in sync"
            exit 0
          fi
          git commit -m "chore(release): sync uv.lock [skip ci]" \
            -m "Align uv.lock's project version with the released version (semantic-release only bumps pyproject/plugin.json)."
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Create GitHub Release
        if: ${{ steps.sr.outputs.released == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG="$(git describe --tags --abbrev=0)"
          if gh release view "$TAG" &>/dev/null; then
            gh release delete "$TAG" --yes
          fi
          PRERELEASE=""
          [ "$REF_NAME" = "stage" ] && PRERELEASE="--prerelease"
          # Release body = the CHANGELOG.md section(s) for the version being released (PSR
          # output: grouped by type, plumbing-filtered via exclude_commit_patterns). awk keeps
          # every LEADING section whose "## vX.Y.Z" core equals the tag core and drops the
          # headers — so a stable release that went through multiple rc's on stage (…-rc.1,
          # …-rc.2) gets them merged — then stops at the first older version. If the top
          # section's core does not match the tag (drift / stale / missing changelog) the
          # output is empty → the else-branch uses GitHub's auto notes, so a release never
          # fails here. `|| true` keeps errexit+pipefail from aborting the step on a no-match.
          TCORE="$(printf '%s' "$TAG" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)"
          awk -v core="$TCORE" '/^## /{v=""; if (match($0,/[0-9]+\.[0-9]+\.[0-9]+/)) v=substr($0,RSTART,RLENGTH); if (v!=core) exit; seen=1; next} seen{print}' CHANGELOG.md > release-body.md 2>/dev/null || true
          if [ -n "$TCORE" ] && [ -s release-body.md ] && grep -q '[^[:space:]]' release-body.md; then
            gh release create "$TAG" --title "$TAG" --notes-file release-body.md $PRERELEASE
          else
            gh release create "$TAG" --title "$TAG" --generate-notes $PRERELEASE
          fi

      - name: On failure — release token hint
        if: ${{ failure() }}
        run: |
          {
            echo "## ⚠️ A release step failed"
            echo "If this was a push/tag/release permission error, the token likely lacks write access."
            echo "Grant it: **Settings → Actions → General → Workflow permissions → Read and write**,"
            echo "or set a PAT secret \`RELEASE_TOKEN\` (Contents + Workflows: Read and write)."
            echo "See USAGE.md → \"Release token write permission\"."
          } >> "$GITHUB_STEP_SUMMARY"
