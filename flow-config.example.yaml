# flow risk-tier environment configuration template
# The project team copies this to the host's .claude/harness-tier/config/flow-config.yaml and fills in the values.
# (The real file is git-tracked — every developer sharing the repo uses the same settings.)
# Team-specific configuration template for harness-tier risk-tiered workflow

branches:
  # Integration branch that features merge into (usually dev or develop)
  integration: dev

  # QA promotion branch (usually stage or staging)
  staging: stage

  # Production release branch (typically main)
  production: main

  # feature branch name prefix (e.g. feature/, feat/)
  feature_prefix: "feature/"

# Per-module pre-checks (monorepo — when each module uses a different language/toolset). A single-stack project is expressed as one module too.
# When declared, the layer-2 flow gate (Claude-session commits) runs verification on "all changed modules".
# checks uses variable keys (lint/static/import_lint/test/security) — only the ones that exist for that language.
# /flow-init drafts these values by referring to the harness docs SSOT, and a human edits them.
# Timing: keys other than security (lint/static/import_lint/test) → every commit (changed modules) /
#         security → staging/release promotion (all modules).
modules:
  - name: api
    path: services/api/
    checks:
      lint:        "ruff check services/api"
      static:      "uv run pyright services/api"
      import_lint: "uv run lint-imports --config services/api/.importlinter"
      test:        "uv run pytest services/api"
      security:    "uv run bandit -r services/api --severity-level medium"
  - name: web
    path: services/web/
    checks:
      lint:   "npm --prefix services/web run lint"
      static: "npm --prefix services/web run typecheck"
      test:   "npm --prefix services/web test"

# Regression / contract / idempotency review checklist
review_checklist:
  - "regression / regression tests pass"
  - "cross-service contract / cross-service contract validity"
  - "DB transaction / migration / DB transaction & migration safety"
  - "async task idempotency / async task idempotency"

# Documentation sync (doc-sync)
doc_sync:
  # Index document (placed at the project root)
  index: CLAUDE.md

  # Documentation directories to sync (glob patterns)
  dirs:
    - "docs/"
    - ".claude/rules/"

  # Per-service local CLAUDE.md (glob pattern)
  service_docs: "services/*/CLAUDE.md"

# REST API contract testing (CI only — GitHub Actions). No REST API → enable:false → not installed.
# /flow-init reads these values and renders .github/workflows/api-contract.yml.
contract_test:
  enable: true
  # Branches this workflow runs on (both push/PR). List them explicitly — extend freely.
  # GitHub Actions branch-filter syntax can be used as-is (e.g. 'release/**').
  # Usually collaboration/promotion branches. Do not include feature/* (exclude heavy verification).
  branches: [dev, stage, main]
  # Pinned via a web check at setup time (avoid stale tools). CI runs deterministically with this pinned value.
  tool: schemathesis
  action_ref: "schemathesis/action@v3"   # major pin
  # OpenAPI spec location (server URL path or in-repo file path)
  schema: "http://localhost:8000/openapi.json"
  base_url: "http://localhost:8000"
  # Server startup = docker compose
  server:
    compose_file: "docker-compose.yml"
    health_url: "http://localhost:8000/health"
    health_timeout: 60                    # seconds

# Semantic versioning/release (downstream = a regular package). /flow-init uses these values to
# render .github/workflows/ (same pattern as api-contract). If unused, enable:false → not installed.
# release_tool is filled in by harness-init research to match the stack.
# CI auth: the rendered release workflow references RELEASE_TOKEN || GITHUB_TOKEN, so it runs on
# the default GITHUB_TOKEN (just grant repo Actions write permission). Add a RELEASE_TOKEN repo
# secret only to escalate (bypass branch protection / trigger downstream); unset → falls back to
# GITHUB_TOKEN, no workflow edit needed.
versioning:
  enable: true
  # Release tool per stack (proposed by harness-init research; candidates: rules/harness-rules.md
  # §13). Ready-made CI templates under github/ (case-insensitive match) exist for:
  # python-semantic-release | semantic-release(node) | jreleaser(java/kotlin) | gitversion(c#) |
  # cargo-release(rust). Other stacks (Go/Scala/C++/PHP/Ruby/Swift/...) get a researched candidate
  # + commit-versioning-guide doc, but the CI workflow itself is opt-in/manual until a template
  # is added under github/.
  release_tool: python-semantic-release
  # Target file:field for version bump (per stack). python: pyproject.toml:project.version / node: package.json:version
  version_files: ["pyproject.toml:project.version"]
  branches:
    stable: main        # stable release
    prerelease: stage   # rc prerelease (empty string if none)
  branch_naming:
    enable: true
  entropy:
    enable: true
    schedule: "0 0 * * 5"   # weekly cron (UTC)
    paths: ["src/"]          # paths for complexity/file-size measurement

# Unit-test CI safety net (CI only — GitHub Actions). The local flow gate (layer 2) runs unit
# tests only on Claude-session commits; contributors committing directly from the terminal, via
# CI, or straight on GitHub bypass that gate. /flow-init reads this block and renders
# .github/workflows/unit-test.yml so unit tests run in CI too (same pattern as api-contract).
# No CI unit tests wanted → enable:false → not installed.
# NOTE: this is NOT derived from modules[] — the local gate and CI run in different execution
# contexts, so the CI job set is declared independently here (self-contained jobs[]).
unit_test:
  enable: true
  # Branches this workflow runs on (both push/PR). Usually collaboration/promotion branches.
  # Do not include feature/* if you want to keep feature-branch pushes light.
  branches: [dev, stage, main]
  # Per-job wall-clock cap (minutes) — applied to every matrix job. Default 10.
  timeout_minutes: 10
  # One entry per language/module to test, rendered into a GitHub Actions strategy.matrix.include:
  #   name:     matrix display name (free-form).
  #   language: python | node | java | go | rust → uses that official setup action (setup-python,
  #             setup-node, setup-java, setup-go, dtolnay/rust-toolchain). Any other value → no
  #             official setup action; the `setup` command below prepares the runtime.
  #   version:  runtime version passed to the official setup action (e.g. '3.12', '20', '21').
  #   setup:    shell command to install deps / prepare the runtime (runs for every job when set).
  #   test:     shell command that runs the unit tests.
  jobs:
    - name: api
      language: python
      version: "3.12"
      setup: "pip install uv && uv sync"
      test: "uv run pytest"
    - name: web
      language: node
      version: "20"
      setup: "npm ci"
      test: "npm test"

# Deployment (CI only — GitHub Actions). Layered ON TOP of versioning: release mints the tag,
# deploy consumes it in the SAME run — release.yml calls deploy.yml via workflow_call, so there is
# no cross-workflow trigger and no admin PAT. Set up by /harness-deployments (detect → Q&A → render).
# enable:false → not installed. See docs/operations/deploy-guide.md.
#
# PRINCIPLE: config holds only NON-DERIVABLE values. The optional fields below are filled with
# derived defaults by the renderer when omitted; the skill DETECTS build_tool and writes it. Only
# enable / name / target / order / auth / custom-permissions are truly human-chosen.
deploy:
  enable: false
  # timeout_minutes: 15            # optional (default 15) — component (executing) job timeout
  # order: [pypi, api-image]       # optional — listed names run sequentially via needs:; omit → all parallel
  # One entry per target → component .github/workflows/deploy-<name>.yml, wired by the deploy.yml orchestrator.
  #   target: pypi | npm | maven-central | nuget | cratesio | ghcr | dockerhub | custom
  targets:
    - name: pypi                   # required — job id (unit_test rule: blank → job-1, job-2 …)
      target: pypi                 # required — which registry/image/custom (selects the template)
      # auth: oidc                 # optional — oidc | token (default per target; pypi/npm → oidc)
      # version: "3.12"            # optional — runtime version (setup-* version); omit → template default
      # build: "uv build"          # optional — artifact build command; omit → stack default
    # - name: api-image
    #   target: ghcr
    #   image: "ghcr.io/OWNER/REPO/api"        # optional — omit → ghcr.io/${{ github.repository }}
    #   context: "services/api"                # optional — omit → "."
    #   dockerfile: "services/api/Dockerfile"  # optional — omit → <context>/Dockerfile
    # - name: central
    #   target: maven-central
    #   build_tool: gradle          # required (skill detects: build.gradle→gradle, pom.xml→maven, build.sbt→sbt)
    #   version: "21"               # optional — JDK
    #   publish: "./gradlew publishAndReleaseToMavenCentral --no-configuration-cache"
    #   # publish — required for build_tool gradle/sbt (no default; §6.4). maven uses its pom's
    #   # central-publishing-maven-plugin config via the template's `mvn deploy` (no publish field).
    # - name: ecs                   # long-tail — the skill authors deploy-ecs.yml from references
    #   target: custom
    #   workflow: ./.github/workflows/deploy-ecs.yml      # required
    #   permissions: { contents: read, id-token: write }  # required — orchestrator uses verbatim
    #   with: { cluster: prod }     # optional — extra inputs to the component (tag is always passed)
