# flow risk-tier policy (immutable, owned by the plugin)
# Risk-tiered workflow tier definitions for harness-tier plugin

tiers:
  docs:
    description: "Changes with no code (docs, comments, config values only)"
    superpowers: false
    gates:
      - doc-sync

  dev:
    description: "Changes that include code (precommit = every-commit module checks on changed modules; custom keys allowed via flow-config checks[].when)"
    superpowers: true
    gates:
      - precommit
      - review
      - doc-sync

  staging:
    description: "QA/RC promotion (dev → stage) — security-tool pre-check + human bump-level selection"
    superpowers: true
    gates:
      - precommit
      - review
      - security-scan
      - bump

  release:
    description: "Production deployment (stage → main) — security tools + security review"
    superpowers: true
    gates:
      - precommit
      - review
      - security-scan
      - security

# Merge strategy enforcement (branch flow → required/forbidden `git merge` flags).
# `source`/`target`: a value containing `/` is a branch-prefix glob; otherwise it is a key of
# flow-config.branches (integration | staging | production). `require`/`forbid` are single flag
# strings. `warn_unless_rebased` only warns — it never blocks.
# Removing this whole key disables the check (the gate then fails open).
merge_strategy:
  - source: "feature/*"
    target: integration
    require: "--squash"
    warn_unless_rebased: true
  - source: "hotfix/*"
    target: production
    require: "--squash"
  - source: staging
    target: production
    require: "--no-ff"
  - source: "fix/*"
    target: integration
    forbid: "--no-ff"
