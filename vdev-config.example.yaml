# vdev 위험도 티어 환경 설정 템플릿
# 프로젝트 팀이 호스트의 .claude/vway-kit/config/vdev-config.yaml 로 복사하여 값을 채운다.
# (실파일은 git 추적 — 같은 저장소를 공유하는 모든 개발자가 동일 설정을 쓴다. 자격증명은 keyring.)
# Team-specific configuration template for vway-kit risk-tiered workflow

branches:
  # feature가 머지되는 통합 브랜치 (보통 dev 또는 develop)
  integration: dev

  # QA 승격 브랜치 (보통 stage 또는 staging)
  staging: stage

  # 프로덕션 릴리스 브랜치 (일반적으로 main)
  production: main

  # feature 브랜치 이름 접두사 (예: feature/, feat/)
  feature_prefix: "feature/"

# 모듈 단위 사전검사 (모노레포 — 모듈별 언어·도구가 다를 때). 단일스택도 모듈 하나로 표현.
# 선언하면 레이어2 vdev 게이트(Claude 세션 커밋)가 "변경 모듈 전체"에 검증을 돌린다.
# checks 는 가변 키(lint/static/import_lint/test/security) — 해당 언어에 있는 것만.
# 이 값들의 초안은 /vdev-init 이 harness docs SSOT 를 참고해 작성하고, 사람이 수정한다.
# 시점: security 제외 키(lint/static/import_lint/test) → 매 커밋(변경 모듈) /
#       security → staging·release 승격(전체 모듈).
# (구버전 전역 test.command 는 폐기 — 모듈별 checks 로 이전. 레이어1 pre-commit 모듈 훅도 폐기.)
modules:
  - name: api
    path: services/api/
    checks:
      lint:        "ruff check services/api"
      static:      "uv run pyright services/api"
      import_lint: "uv run lint-imports --config services/api/.importlinter"
      test:        "uv run pytest services/api"
      security:    "uv run bandit -r services/api --severity-level medium"
  - name: web
    path: services/web/
    checks:
      lint:   "npm --prefix services/web run lint"
      static: "npm --prefix services/web run typecheck"
      test:   "npm --prefix services/web test"

# 회귀·계약·이디엠포턴시 검토 체크리스트
review_checklist:
  - "regression / 회귀 테스트 통과"
  - "cross-service contract / 서비스 간 계약 유효성"
  - "DB transaction / migration / DB 트랜잭션·마이그레이션 안전성"
  - "async task idempotency / 비동기 작업 멱등성"

# Teamer.live 연동 (task-sync)
teamer:
  # 기본 프로젝트 번호 (task-sync 시 ?project_no=... 파라미터)
  # 예: 996 (기본), 604 (다른 프로젝트)
  project_no: "996"

  # 기본 workitem 번호 (task-sync 시 ?workitem_no=... 파라미터)
  # 예: 188180 (기본), 200000 (다른 팀)
  workitem_no: "188180"

  # 워크플로 번호 (task-sync 가 상태 전이 시 status_no 를 조회하는 워크플로)
  # target_status_name 으로 상태를 바꿀 때만 사용. 팀별로 다름.
  # 예: 164489
  workflow_no: "164489"

# 인수인계(handoff) — task-sync 가 종류별 내용을 Teamer 필드에 전달
# 종류 키는 확장 지점(qa 외 ops/security 등 동일 패턴). 미설정 시 summary 기존 동작 유지.
handoff:
  summary:                          # 기존 AI 요약 = handoff 의 한 종류
    enable: true
    author: AI                      # AI|LLM|Agent → AI 대필 / 그 외 → 사람 이름
    AskUserQuestion: false          # true 면 실행 시 AskUserQuestion 으로 입력/지침
    field: item_content             # item_content → append
    template: handoff/summary.html  # templates/ 기준 상대경로 (host 우선·plugin fallback)
  qa:                               # 신규 종류 예시 (필요 없으면 삭제/enable:false)
    enable: false
    author: AI
    AskUserQuestion: true
    field: col22                    # colXX → replace (전용 필드)
    instruction: "QA 인수인계 — 테스트 범위, 재현 절차, 리스크 포인트"
    # template: handoff/qa.html     # 선택 — 생략 시 일반 HTML div 래핑
  done_flag:                        # 신규 종류 — 특정 필드에 고정값
    enable: false
    # author 불필요 — value(literal) source 는 작성자 래핑을 하지 않음
    field: col31                    # colXX → replace 기본
    value: "완료"                   # value 있으면 template/AI/래핑 생략, 값 그대로
    append: false                   # 누적(true)/교체(false) 명시 — 미지정 시 field 기본
  done_date:                        # 신규 종류 — 특정 필드에 자동 날짜
    enable: false
    field: col30
    value: "${today}"               # 실행일(YYYY-MM-DD)로 치환
    append: false

# 문서 동기화 (doc-sync)
doc_sync:
  # 인덱스 문서 (프로젝트 루트에 배치)
  index: CLAUDE.md

  # 동기화할 문서 디렉토리 (glob 패턴)
  dirs:
    - "docs/"
    - ".claude/rules/"

  # 서비스별 로컬 CLAUDE.md (glob 패턴)
  service_docs: "services/*/CLAUDE.md"

# REST API 계약 테스트 (CI 전용 — GitHub Actions). REST API 없으면 enable:false → 미설치.
# /vdev-init 이 이 값을 읽어 .github/workflows/api-contract.yml 을 렌더링한다.
contract_test:
  enable: true
  # 이 워크플로우가 동작할 브랜치 (push/PR 모두). 직접 나열 — 확장 자유.
  # GitHub Actions 브랜치 필터 문법 그대로 사용 가능 (예: 'release/**').
  # 보통 협업/promotion 브랜치. feature/* 는 넣지 않는다(무거운 검증 제외).
  branches: [dev, stage, main]
  # 셋업 시 웹 확인으로 pin (정체 도구 회피). CI는 이 고정값으로 결정적 실행.
  tool: schemathesis
  action_ref: "schemathesis/action@v3"   # 메이저 핀
  # OpenAPI 스펙 위치 (서버 URL 경로 또는 레포 내 파일 경로)
  schema: "http://localhost:8000/openapi.json"
  base_url: "http://localhost:8000"
  # 서버 기동 = docker compose
  server:
    compose_file: "docker-compose.yml"
    health_url: "http://localhost:8000/health"
    health_timeout: 60                    # 초

# 의미기반 버전/릴리스 (다운스트림 = 일반 패키지). /vdev-init 이 이 값으로
# .github/workflows/ 를 렌더한다(api-contract 와 동일 패턴). 안 쓰면 enable:false → 미설치.
# release_tool 은 harness-init 리서치가 스택에 맞게 채운다.
versioning:
  enable: true
  # 스택별 릴리스 도구. 지원: python-semantic-release | semantic-release(node)
  release_tool: python-semantic-release
  # 버전 bump 대상 file:field (스택별). python: pyproject.toml:project.version / node: package.json:version
  version_files: ["pyproject.toml:project.version"]
  branches:
    stable: main        # 정식 릴리스
    prerelease: stage   # rc 프리릴리스 (없으면 빈 문자열)
  branch_naming:
    enable: true
  entropy:
    enable: true
    schedule: "0 0 * * 5"   # 주간 cron (UTC)
    paths: ["src/"]          # 복잡도/파일크기 측정 경로
